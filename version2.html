<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Readathon 2026 - SaaS Plus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle at top,#0f172a,#0b1224,#050816);
    color:white;
    display:flex;
    overflow-x:hidden;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
    color:#38bdf8;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    opacity:0.7;
    transition:0.3s;
}

.sidebar a:hover{
    color:#38bdf8;
    opacity:1;
    transform:translateX(6px);
}

/* ================= MAIN ================= */
.main{
    margin-left:250px;
    padding:25px;
    width:100%;
}

/* ================= HEADER ================= */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top h1{
    font-size:26px;
    background:linear-gradient(90deg,#38bdf8,#a78bfa,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= HERO BANNER ================= */
.hero{
    background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') center/cover;
    height:220px;
    border-radius:18px;
    display:flex;
    align-items:center;
    padding:20px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
    animation:float 6s ease-in-out infinite;
}

.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

.hero h2{
    position:relative;
    z-index:2;
    font-size:28px;
}

/* ================= GRID ================= */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    transition:0.4s;
    backdrop-filter:blur(10px);
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    border-color:#38bdf8;
    box-shadow:0 15px 40px rgba(56,189,248,0.2);
}

/* glow effect */
.card::before{
    content:'';
    position:absolute;
    width:120px;
    height:120px;
    background:#38bdf8;
    filter:blur(80px);
    opacity:0.15;
    top:-40px;
    right:-40px;
}

/* ================= NUMBERS ================= */
.num{
    font-size:28px;
    color:#38bdf8;
    font-weight:600;
}

/* ================= IMAGE SECTION ================= */
.image-row{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

.img-card{
    border-radius:15px;
    overflow:hidden;
    position:relative;
    transition:0.4s;
}

.img-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    transition:0.4s;
}

.img-card:hover img{
    transform:scale(1.1);
    filter:brightness(1.2);
}

.img-card::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.04);
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

/* ================= FLOAT ANIMATION ================= */
@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* ================= FADE ================= */
.fade{
    opacity:0;
    transform:translateY(30px);
    transition:0.8s ease;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
<h2>📚 Readathon</h2>
<a href="#dash">📊 Dashboard</a>
<a href="#stats">📈 Stats</a>
<a href="#gallery">🖼 Gallery</a>
<a href="#leader">🏆 Leaderboard</a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

<div class="top fade">
<h1>Readathon SaaS Dashboard</h1>
<div>👤 Student Panel</div>
</div>

<!-- HERO IMAGE -->
<div class="hero fade">
<h2>📚 Read • Learn • Grow 🚀</h2>
</div>

<!-- DASHBOARD -->
<div class="grid fade" id="dash">

<div class="card">
📚 Books
<div class="num" data-target="120">0</div>
</div>

<div class="card">
👦 Readers
<div class="num" data-target="300">0</div>
</div>

<div class="card">
📄 Pages
<div class="num" data-target="45000">0</div>
</div>

<div class="card">
⏱ Minutes
<div class="num" data-target="12000">0</div>
</div>

</div>

<!-- IMAGE GALLERY -->
<div class="image-row fade" id="gallery">

<div class="img-card">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
</div>

<div class="img-card">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
</div>

<div class="img-card">
<img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66">
</div>

<div class="img-card">
<img src="https://images.unsplash.com/photo-1455885666463-0ffe7d3c7b8d">
</div>

</div>

<!-- LEADERBOARD -->
<div class="fade" id="leader">
<h2 style="margin:20px 0;color:#38bdf8;">🏆 Leaderboard</h2>

<table>
<tr><th>Rank</th><th>Name</th><th>Books</th></tr>
<tr><td>1</td><td>A</td><td>25</td></tr>
<tr><td>2</td><td>B</td><td>22</td></tr>
<tr><td>3</td><td>C</td><td>20</td></tr>
</table>

</div>

</div>

<script>

/* ================= COUNTERS ================= */
const nums = document.querySelectorAll(".num");

function count(){
    nums.forEach(n=>{
        const target = +n.getAttribute("data-target");
        let val = +n.innerText;

        const step = target / 70;

        if(val < target){
            n.innerText = Math.ceil(val + step);
        } else {
            n.innerText = target;
        }
    });
}

/* ================= SCROLL ================= */
const fade = document.querySelectorAll(".fade");

function reveal(){
    fade.forEach(el=>{
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 80){
            el.classList.add("show");
        }
    });
}

window.addEventListener("scroll",reveal);
window.addEventListener("load",reveal);

setInterval(count,40);

</script>

</body>
</html>
